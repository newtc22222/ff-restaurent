name: Phase 2 contract verification

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: phase-2-contract-verification
  cancel-in-progress: false

jobs:
  verify:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    env:
      DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
      PHASE2_CONTRACT_REPORT_PATH: ${{ github.workspace }}/artifacts/phase2-contract.json
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run prisma:generate -w @ff-restaurent/api
      - name: Verify normalized contract and removed schema
        run: npm run prisma:phase2:contract:verify -w @ff-restaurent/api
      - name: Capture release boundary
        shell: bash
        run: |
          {
            echo "sha=${GITHUB_SHA}"
            echo "completedAt=$(date --utc --iso-8601=seconds)"
          } > artifacts/phase2-contract-metadata.txt
      - name: Upload release evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: phase2-contract-${{ github.run_id }}
          path: artifacts
          if-no-files-found: error
          retention-days: 30
