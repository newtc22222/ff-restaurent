name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ff_restaurent_test
          POSTGRES_USER: ff
          POSTGRES_PASSWORD: ff
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ff -d ff_restaurent_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://ff:ff@localhost:5432/ff_restaurent_test?schema=public
      JWT_SECRET: ci-only-secret-that-is-at-least-32-characters
      REGISTRATION_INVITE_CODE: ci-invite-code
      CORS_ORIGINS: http://localhost:5173
      RUN_INTEGRATION_TESTS: '1'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build -w @ff-restaurent/shared
      - run: npm run lint
      - name: Generate Prisma client (workspace)
        run: npm run prisma:generate --workspace @ff-restaurent/api
      - run: npm run typecheck
      - name: Verify representative RC upgrade and contract failures
        shell: bash
        run: bash scripts/verify-phase2-contract-migration.sh
      - run: npm run prisma:migrate:deploy -w @ff-restaurent/api
      - name: Verify production baseline capture and failure handling
        shell: bash
        env:
          RUN_BASELINE_DB_TESTS: '1'
        run: bash scripts/capture-production-baseline.test.sh
      - name: Verify FF-58 rehearsal failure handling
        shell: bash
        run: bash scripts/rehearse-gcp-migration.test.sh
      - name: Verify FF-58 PostgreSQL 16 two-pass rehearsal
        shell: bash
        env:
          RUN_FF58_DB_TESTS: '1'
        run: bash scripts/rehearse-gcp-migration.integration.test.sh
      - run: npm run prisma:phase2:contract:verify -w @ff-restaurent/api
      - run: npm run prisma:indexes:verify -w @ff-restaurent/api
      - name: Verify one-shot release ordering and failure handling
        shell: bash
        run: bash scripts/run-release-job.test.sh
      - name: Verify Cloud Run container boundaries
        shell: bash
        run: bash scripts/verify-cloud-run-containers.sh
      - run: npm test
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
