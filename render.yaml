services:
  - type: web
    name: ff-restaurent
    runtime: static
    branch: main
    buildCommand: npm ci && npm run build -w @ff-restaurent/shared && npm run build -w @ff-restaurent/web
    staticPublishPath: apps/web/dist
    autoDeployTrigger: commit
    envVars:
      - key: VITE_API_URL
        sync: false
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /index.html
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
