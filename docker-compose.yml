services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ff_restaurent
      POSTGRES_USER: ff
      POSTGRES_PASSWORD: ff
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ff -d ff_restaurent']
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://ff:ff@postgres:5432/ff_restaurent?schema=public}
      JWT_SECRET: ${JWT_SECRET:-local-dev-change-me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      REGISTRATION_INVITE_CODE: ${REGISTRATION_INVITE_CODE:-local-dev-invite}
      NODE_ENV: ${NODE_ENV:-development}
      API_PORT: ${API_PORT:-4000}
    command: >
      sh -c '
        npx prisma migrate deploy &&
        if [ "$$NODE_ENV" = "production" ]; then
          if [ -z "$$JWT_SECRET" ] || [ "$$JWT_SECRET" = "local-dev-change-me" ]; then
            echo "JWT_SECRET must be set to a production secret when NODE_ENV=production";
            exit 1;
          fi;
          if [ -z "$$CORS_ORIGINS" ] || [ "$$CORS_ORIGINS" = "http://localhost:5173" ]; then
            echo "CORS_ORIGINS must be set to the production frontend origin when NODE_ENV=production";
            exit 1;
          fi;
          if [ -z "$$REGISTRATION_INVITE_CODE" ] || [ "$$REGISTRATION_INVITE_CODE" = "local-dev-invite" ]; then
            echo "REGISTRATION_INVITE_CODE must be set to a private production invite when NODE_ENV=production";
            exit 1;
          fi;
        else
          npx tsx prisma/seed-if-empty.ts;
        fi &&
        node dist/server.js
      '
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}
    ports:
      - '5173:80'
    depends_on:
      - api

volumes:
  postgres-data:

#  docker stop $(docker ps -q)
